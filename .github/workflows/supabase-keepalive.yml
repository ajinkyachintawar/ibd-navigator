name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8am UTC — prevents free tier pause after 1 week idle
  workflow_dispatch:       # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/markers?limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "Supabase ping status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Supabase is active" || echo "⚠️ Unexpected status: $STATUS"
